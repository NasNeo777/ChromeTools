<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek 工具箱</title>
  <style>
    :root { --brand1: #4d6bfe; --brand2: #6d3bfe; }
    body {
      width: 340px; margin: 0; padding: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: #1f2328; background: #f6f7fb;
    }
    .hero {
      padding: 16px 16px 14px;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      color: #fff;
    }
    .hero h1 { font-size: 16px; margin: 0; display: flex; align-items: center; gap: 8px; }
    .hero p { font-size: 11px; margin: 6px 0 0; opacity: .85; }

    .section { padding: 14px 16px; }
    .card {
      background: #fff; border-radius: 10px; padding: 12px 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 12px;
    }
    .card-head {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; margin-bottom: 4px;
    }
    .card-head .badge {
      margin-left: auto; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
    }
    .badge.on { background: #e6f4ea; color: #2da44e; }
    .badge.off { background: #fbeaea; color: #cf222e; }
    .card-desc { font-size: 12px; color: #57606a; line-height: 1.5; margin-bottom: 8px; }

    label { display: block; font-size: 11px; color: #57606a; margin: 8px 0 4px; }
    input[type="password"], select {
      width: 100%; box-sizing: border-box; padding: 7px 9px; font-size: 13px;
      border: 1px solid #d0d7de; border-radius: 6px; outline: none; background: #fff;
    }
    input:focus, select:focus { border-color: var(--brand1); }

    .global-title { font-size: 11px; color: #8c959f; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .hint { font-size: 11px; color: #8c959f; margin-top: 6px; line-height: 1.5; }
    a { color: #0969da; text-decoration: none; }

    button.save {
      width: 100%; padding: 9px; font-size: 13px; font-weight: 600; color: #fff;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      border: none; border-radius: 6px; cursor: pointer;
    }
    button.save:hover { filter: brightness(1.08); }
    .status { font-size: 12px; margin-top: 8px; min-height: 16px; text-align: center; }
    .status.ok { color: #2da44e; }
    .status.err { color: #cf222e; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🧰 DeepSeek 工具箱</h1>
    <p>由 DeepSeek 驱动的浏览器小工具集合</p>
  </div>

  <div class="section">
    <!-- 共享配置 -->
    <div class="card">
      <div class="global-title">通用配置（所有工具共用）</div>
      <label for="apiKey">DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." />
      <div class="hint">
        在 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a> 获取，仅保存在本地浏览器。
      </div>
      <label for="model">模型</label>
      <select id="model">
        <option value="deepseek-chat">deepseek-chat（推荐，快）</option>
        <option value="deepseek-reasoner">deepseek-reasoner（更强，慢）</option>
      </select>
    </div>

    <!-- 工具卡片（由 popup.js 动态渲染） -->
    <div id="tool-list"></div>

    <button class="save" id="save">保存设置</button>
    <div class="status" id="status"></div>
  </div>

  <script src="tools.js"></script>
  <script src="popup.js"></script>
</body>
</html>
